services:
  db:
    image: postgres:16-alpine
    container_name: powerbeacon-db-dev
    environment:
      POSTGRES_USER: powerbeacon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeMe}
      POSTGRES_DB: powerbeacon
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    networks:
      - powerbeacon-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerbeacon"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: powerbeacon-backend-dev
    environment:
      DB_URL: ${DB_URL:-postgresql+psycopg2://powerbeacon:${DB_PASSWORD:-changeMe}@db:5432/powerbeacon}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      PYTHONUNBUFFERED: 1
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - powerbeacon-dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: powerbeacon-frontend-dev
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/package.json:/app/package.json
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - powerbeacon-dev
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data_dev:

networks:
  powerbeacon-dev:
    driver: bridge
