services:
  db:
    image: postgres:16-alpine
    container_name: powerbeacon-db
    environment:
      POSTGRES_USER: powerbeacon
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeMe}
      POSTGRES_DB: powerbeacon
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - powerbeacon
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U powerbeacon"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: powerbeacon-backend
    environment:
      DB_URL: postgresql://powerbeacon:${DB_PASSWORD:-changeMe}@db:5432/powerbeacon
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - powerbeacon

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: powerbeacon-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - powerbeacon

volumes:
  postgres_data:

networks:
  powerbeacon:
    driver: bridge
